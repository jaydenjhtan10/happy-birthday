<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* General page styling */
        body {
            /* Updated font family to Poppins! */
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden; 
        }

        /* The birthday card container */
        .card {
            background-color: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Typography */
        h1 {
            color: #ff6b81;
            font-size: 3.5em;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 700; /* Bold Poppins */
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
            font-weight: 400; /* Regular Poppins */
        }

        /* Interactive button */
        .surprise-btn {
            font-family: 'Poppins', sans-serif; /* Ensuring the button uses Poppins too */
            background-color: #ff6b81;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: 600; /* Semi-bold Poppins */
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
            transition: all 0.2s ease;
        }

        .surprise-btn:hover {
            background-color: #ff4760;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.6);
        }

        /* Hide the surprise message initially */
        #secret-message {
            display: none;
            margin-top: 25px;
            font-size: 1.5em;
            color: #2ed573;
            font-weight: 700;
            animation: fadeIn 1s;
        }

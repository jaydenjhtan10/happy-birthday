<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* General page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden; /* Keeps the confetti from creating scrollbars */
        }

        /* The birthday card container */
        .card {
            background-color: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10; /* Keeps the card above the confetti */
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Typography */
        h1 {
            color: #ff6b81;
            font-size: 3.5em;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }

        /* Interactive button */
        .surprise-btn {
            background-color: #ff6b81;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
            transition: all 0.2s ease;
        }

        .surprise-btn:hover {
            background-color: #ff4760;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.6);
        }

        /* Hide the surprise message initially */
        #secret-message {
            display: none;
            margin-top: 25px;
            font-size: 1.5em;
            color: #2ed573;
            font-weight: bold;
            animation: fadeIn 1s;
        }

        /* Simple fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday! 🎂</h1>
        <p>Wishing you the most incredible day filled with laughter, joy, and all your favorite things. You deserve the best today and always!</p>
        
        <button class="surprise-btn" onclick="revealSurprise()">Click for a Surprise!</button>
        
        <div id="secret-message">
            🎉 Have an awesome year ahead! 🎈
        </div>
    </div>

    <script>
        // This function runs when the button is clicked
        function revealSurprise() {
            const message = document.getElementById('secret-message');
            const button = document.querySelector('.surprise-btn');
            
            // Show the hidden message
            message.style.display = 'block';
            
            // Change the button text and color
            button.innerText = 'Yay! 🥳';
            button.style.backgroundColor = '#2ed573';
            button.style.boxShadow = '0 5px 15px rgba(46, 213, 115, 0.4)';

            // Fire the confetti!
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 } // Makes it burst slightly lower down so it arcs nicely
            });
        }
    </script>

</body>
</html>
